<!DOCTYPE html>
<html lang="tr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Kadir TV</title>
  
  <link href="https://vjs.zencdn.net/8.10.0/video-js.css" rel="stylesheet" />
  <script src="https://vjs.zencdn.net/8.10.0/video.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/hls.js@latest"></script>

  <style>
    @import url('https://fonts.googleapis.com/css2?family=Orbitron:wght@500;700;900&display=swap');
    
    * { margin:0; padding:0; box-sizing:border-box; }
    body { 
      font-family: 'Orbitron', sans-serif; 
      background: linear-gradient(135deg, #0f0f1a, #1a0033);
      color: #fff; 
      overflow: hidden;
    }
    
    .header {
      text-align: center;
      padding: 25px 0;
      background: rgba(0,0,0,0.7);
      backdrop-filter: blur(10px);
      position: fixed;
      top: 0;
      width: 100%;
      z-index: 1000;
    }
    .logo {
      font-size: 3.2rem;
      font-weight: 900;
      background: linear-gradient(90deg, #00ffff, #ff00ff, #ffff00);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      text-shadow: 0 0 30px rgba(0,255,255,0.5);
    }
    .subtitle { font-size: 1.1rem; color: #00ffff; margin-top: 8px; }

    .container {
      display: grid;
      grid-template-columns: 1fr 360px;
      height: 100vh;
      padding-top: 110px;
      gap: 20px;
      max-width: 1600px;
      margin: 0 auto;
      padding-left: 20px;
      padding-right: 20px;
    }

    .player {
      background: #000;
      border-radius: 20px;
      overflow: hidden;
      box-shadow: 0 0 50px rgba(0, 255, 255, 0.4);
    }

    .sidebar {
      background: rgba(10, 0, 30, 0.85);
      border-radius: 20px;
      backdrop-filter: blur(15px);
      border: 1px solid rgba(0,255,255,0.2);
      overflow: hidden;
      box-shadow: 0 0 40px rgba(138, 43, 226, 0.6);
    }

    .search {
      padding: 20px;
      background: rgba(0,255,255,0.1);
    }
    .search input {
      width: 100%;
      padding: 15px 20px;
      border: 2px solid #00ffff;
      border-radius: 50px;
      background: transparent;
      color: white;
      font-family: 'Orbitron';
      font-size: 1rem;
    }

    .list { 
      height: calc(100vh - 280px); 
      overflow-y: auto; 
    }

    .channel {
      padding: 16px 20px;
      display: flex;
      align-items: center;
      gap: 15px;
      cursor: pointer;
      transition: 0.3s;
      border-bottom: 1px solid rgba(0,255,255,0.1);
    }
    .channel:hover { background: rgba(0,255,255,0.15); }
    .channel.active {
      background: linear-gradient(90deg, #00ffff22, transparent);
      border-left: 4px solid #00ffff;
      font-weight: bold;
      box-shadow: 0 0 20px rgba(0,255,255,0.3);
    }
    .channel img {
      width: 50px;
      height: 50px;
      border-radius: 12px;
      border: 2px solid #00ffff;
    }

    @media (max-width: 992px) {
      .container { grid-template-columns: 1fr; padding-top: 100px; }
      .logo { font-size: 2.5rem; }
    }
  </style>
</head>
<body>

  <div class="header">
    <div class="logo">KADİR TV</div>
    <div class="subtitle">Ultra HD • Reklamsız • Canlı</div>
  </div>

  <div class="container">
    <div class="player">
      <video id="player" class="video-js vjs-fluid vjs-big-play-centered" controls preload="auto" poster="https://i.imgur.com/8U1nKkZ.jpg"></video>
    </div>

    <div class="sidebar">
      <div class="search">
        <input type="text" id="search" placeholder="Kanal ara..." />
      </div>
      <div class="list" id="channels"></div>
    </div>
  </div>

<script>
const M3U_URL = "https://raw.githubusercontent.com/kadirsener1/tivim/refs/heads/main/1.m3u";

let channels = [];
let player = null;

async function load() {
  const res = await fetch(M3U_URL);
  const text = await res.text();
  parse(text);
}

function parse(data) {
  const lines = data.split('\n');
  let ch = {};
  
  lines.forEach(line => {
    if (line.includes('#EXTINF:')) {
      const name = line.split(',').pop().trim();
      const logo = line.match(/tvg-logo="([^"]+)"/)?.[1] || "https://via.placeholder.com/50/333/fff?text=TV";
      const group = line.match(/group-title="([^"]+)"/)?.[1] || "Genel";
      
      ch = { name, logo, group, url: "" };
    }
    else if (line.trim() && !line.startsWith('#') && line.includes('http')) {
      ch.url = line.trim();
      channels.push(ch);
      ch = {};
    }
  });
  render();
  playChannel(channels[0].url, channels[0].name);
}

function render(filter = "") {
  const html = channels
    .filter(c => c.name.toLowerCase().includes(filter.toLowerCase()))
    .map((c, i) => `
      <div class="channel ${i===0 ? 'active' : ''}" onclick="playChannel('${c.url}', '${c.name}')">
        <img src="${c.logo}" onerror="this.src='https://via.placeholder.com/50/333/fff?text=TV'">
        <div>${c.name}</div>
      </div>
    `).join('');
  
  document.getElementById('channels').innerHTML = html || "<div style='padding:30px;text-align:center'>Kanal yok</div>";
}

function playChannel(url, name) {
  document.querySelectorAll('.channel').forEach(c => c.classList.remove('active'));
  event.target.closest('.channel').classList.add('active');
  document.title = name + " - KADİR TV";

  if (player) player.dispose();

  player = videojs('player', { autoplay: true, controls: true, fluid: true });

  if (Hls.isSupported()) {
    const hls = new Hls();
    hls.loadSource(url);
    hls.attachMedia(document.querySelector('video'));
  } else {
    player.src({ type: 'application/x-mpegURL', src: url });
  }
}

document.getElementById('search').addEventListener('input', e => render(e.target.value));

load();
</script>
</body>
</html>
