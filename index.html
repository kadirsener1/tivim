<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>🌟 CANLI TV</title>
<script src="https://cdn.jsdelivr.net/npm/hls.js@latest"></script>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">

<style>
:root {
  --bg:#080b10;
  --bg2:#0e1318;
  --bg3:#141a22;
  --border:rgba(255,255,255,0.06);
  --accent:#e8373d;
  --gold:#f5c842;
  --text:#e8eaf0;
  --muted:#5a6478;
}

*{margin:0;padding:0;box-sizing:border-box}

body{
  font-family:'DM Sans',sans-serif;
  background:var(--bg);
  color:var(--text);
  min-height:100vh;
  overflow-x:hidden;
}

header{
  display:flex;
  align-items:center;
  justify-content:space-between;
  padding:16px 28px;
  background:rgba(8,11,16,0.97);
  border-bottom:1px solid var(--border);
}

.logo{
  font-family:'Bebas Neue',sans-serif;
  font-size:26px;
  letter-spacing:3px;
  display:flex;
  gap:10px;
  align-items:center;
}

.logo-dot{
  width:10px;height:10px;
  background:var(--accent);
  border-radius:50%;
}

.app{
  display:grid;
  grid-template-columns:280px 1fr;
  height:calc(100vh - 61px);
}

.sidebar{
  background:var(--bg2);
  border-right:1px solid var(--border);
  display:flex;
  flex-direction:column;
}

.sidebar-tabs{
  display:flex;
  border-bottom:1px solid var(--border);
}

.tab-btn{
  flex:1;
  background:none;
  border:none;
  color:var(--muted);
  padding:12px;
  cursor:pointer;
}
.tab-btn.active{
  color:#fff;
  border-bottom:2px solid var(--accent);
}

.cat-bar{
  display:flex;
  gap:6px;
  padding:10px;
  overflow-x:auto;
}

.cat-pill{
  background:var(--bg3);
  color:var(--muted);
  padding:5px 12px;
  border-radius:20px;
  cursor:pointer;
  font-size:11px;
}
.cat-pill.active{
  background:var(--accent);
  color:#fff;
}

.channel-list{
  flex:1;
  overflow-y:auto;
  padding:6px;
}

.channel{
  display:flex;
  gap:10px;
  padding:8px;
  border-radius:8px;
  cursor:pointer;
}
.channel:hover{
  background:var(--bg3);
}
.channel.active{
  background:rgba(232,55,61,.15);
}

.ch-logo{
  width:40px;height:40px;
  background:var(--bg3);
  display:flex;
  align-items:center;
  justify-content:center;
  border-radius:6px;
}

.main{
  display:flex;
  flex-direction:column;
  background:#000;
}

.player-ratio{
  position:relative;
  width:100%;
  padding-top:50%;
  background:#000;
}

#video{
  position:absolute;
  inset:0;
  width:100%;
  height:100%;
  display:none;
}

.player-idle{
  position:absolute;
  inset:0;
  display:flex;
  align-items:center;
  justify-content:center;
  flex-direction:column;
  color:var(--muted);
}
</style>
</head>
<body>

<header>
  <div class="logo">
    <div class="logo-dot"></div>
    CANLI TV
  </div>
</header>

<div class="app">

<!-- SIDEBAR -->
<aside class="sidebar">

  <div class="sidebar-tabs">
    <button class="tab-btn active" onclick="switchTab('all',this)">TÜM KANALLAR</button>
    <button class="tab-btn" onclick="switchTab('fav',this)">⭐ FAVORİLER</button>
  </div>

  <div class="cat-bar" id="catBar">
    <button class="cat-pill active" onclick="filterCat('',this)">Tümü</button>
  </div>

  <div class="channel-list" id="channelList">
    Yükleniyor...
  </div>

</aside>

<!-- MAIN -->
<main class="main">

<div class="player-ratio">

  <div class="player-idle" id="playerIdle">
    📺 <br> İzlemek için kanal seçin
  </div>

  <video id="video" controls playsinline></video>

</div>

</main>

</div>

<script>
/* ========== DATA ========== */
const M3U_URL="https://raw.githubusercontent.com/kadirsener1/tivim/refs/heads/main/1.m3u";

let allChannels=[];
let favorites=JSON.parse(localStorage.getItem("favorites")||"[]");
let currentCh=null;
let currentTab="all";
let currentCat="";
let hls;

/* ========== LOAD M3U ========== */
fetch(M3U_URL)
.then(r=>r.text())
.then(txt=>{
  const lines=txt.split("\n");
  for(let i=0;i<lines.length;i++){
    if(lines[i].startsWith("#EXTINF")){
      const name=lines[i].split(",")[1]||"Kanal";
      const url=lines[i+1]?.trim();
      if(!url?.startsWith("http"))continue;

      const g=lines[i].match(/group-title="([^"]*)"/i);
      const l=lines[i].match(/tvg-logo="([^"]*)"/i);

      allChannels.push({
        name,
        url,
        group:g?g[1]:"Genel",
        logo:l?l[1]:""
      });
    }
  }
  buildCats();
  renderList();
});

/* ========== UI ========== */
function buildCats(){
  const bar=document.getElementById("catBar");
  const groups=["",...new Set(allChannels.map(c=>c.group))];

  bar.innerHTML=groups.map((g,i)=>`
    <button class="cat-pill ${i==0?"active":""}"
    onclick="filterCat('${g}',this)">
      ${i==0?"Tümü":g}
    </button>`).join("");
}

function filterCat(c,el){
  currentCat=c;
  document.querySelectorAll(".cat-pill").forEach(b=>b.classList.remove("active"));
  el.classList.add("active");
  renderList();
}

function switchTab(t,b){
  currentTab=t;
  document.querySelectorAll(".tab-btn").forEach(x=>x.classList.remove("active"));
  b.classList.add("active");
  renderList();
}

function renderList(){
  let list=allChannels;

  if(currentTab=="fav") list=list.filter(c=>favorites.includes(c.url));
  if(currentCat) list=list.filter(c=>c.group==currentCat);

  document.getElementById("channelList").innerHTML=
  list.map((c,i)=>`
    <div class="channel ${currentCh?.url==c.url?"active":""}"
      onclick="play(${allChannels.indexOf(c)})">
      <div class="ch-logo">📺</div>
      <div>${c.name}</div>
    </div>
  `).join("");
}
    <script>

/* ===== PLAY (OPTIMIZE EDİLMİŞ) ===== */
const video = document.getElementById("video");

function play(idx){
  const ch=allChannels[idx];
  if(!ch) return;

  currentCh=ch;

  document.getElementById("playerIdle").style.display="none";
  video.style.display="block";

  if(Hls.isSupported()){
    if(hls){
      hls.destroy();
      hls=null;
    }

    hls=new Hls({
      enableWorker:true,
      lowLatencyMode:true,

      // 🔥 DONMA OPTİMİZASYON
      maxBufferLength:10,
      maxMaxBufferLength:20,
      backBufferLength:30,

      liveSyncDurationCount:3,

      fragLoadingMaxRetry:3,
      fragLoadingRetryDelay:800,
      levelLoadingMaxRetry:3,
      levelLoadingRetryDelay:800
    });

    hls.loadSource(ch.url);
    hls.attachMedia(video);

    hls.on(Hls.Events.MANIFEST_PARSED,()=>{
      video.play().catch(()=>{});
    });

    hls.on(Hls.Events.ERROR,(e,d)=>{
      if(d.fatal){
        if(d.type==="networkError") hls.startLoad();
        else if(d.type==="mediaError") hls.recoverMediaError();
        else hls.destroy();
      }
    });

  } else {
    video.src=ch.url;
    video.play().catch(()=>{});
  }

  video.volume=0.9;

  renderList();
}

/* ===== STOP ===== */
function stop(){
  if(hls){hls.destroy();hls=null;}
  video.pause();
  video.src="";
  video.style.display="none";
  document.getElementById("playerIdle").style.display="flex";
  currentCh=null;
  renderList();
}

/* ===== NEXT / PREV ===== */
function next(){
  let i=allChannels.findIndex(c=>c.url==currentCh?.url);
  play((i+1)%allChannels.length);
}

function prev(){
  let i=allChannels.findIndex(c=>c.url==currentCh?.url);
  play((i-1+allChannels.length)%allChannels.length);
}

/* ===== FAVORİ ===== */
function toggleFav(url){
  if(favorites.includes(url)){
    favorites=favorites.filter(x=>x!=url);
  }else{
    favorites.push(url);
  }
  localStorage.setItem("favorites",JSON.stringify(favorites));
  renderList();
}

/* ===== KEYBOARD ===== */
document.addEventListener("keydown",(e)=>{
  if(e.key==="ArrowRight") next();
  if(e.key==="ArrowLeft") prev();
  if(e.key==="Escape") stop();
});

/* ===== INIT ===== */
renderList();

</script>

</body>
</html>
