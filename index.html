<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>NOVA Player</title>

<script src="https://cdnjs.cloudflare.com/ajax/libs/hls.js/1.4.12/hls.min.js"></script>

<style>
body{margin:0;background:#000;color:#fff;font-family:Arial}
#top{padding:10px;background:#111;display:flex;gap:10px}
#list{width:300px;background:#111;height:calc(100vh - 50px);overflow:auto;float:left}
#player{margin-left:300px;height:calc(100vh - 50px)}
video,iframe{width:100%;height:100%;background:#000}
.item{padding:10px;border-bottom:1px solid #222;cursor:pointer}
.item:hover{background:#222}
</style>
</head>

<body>

<div id="top">
<input id="urlInput" style="flex:1" placeholder="URL gir..."/>
<button onclick="playUrl()">Oynat</button>
</div>

<div id="list">Yükleniyor...</div>

<div id="player">
<video id="video" controls style="display:none"></video>
<iframe id="iframe" style="display:none" allowfullscreen></iframe>
</div>

<script>
/* ============================
   AYARLAR
============================ */
const M3U_URL = "https://raw.githubusercontent.com/kadirsener1/tivim/refs/heads/main/1.m3u";

const PROXIES = [
 u => `https://api.allorigins.win/raw?url=${encodeURIComponent(u)}`,
 u => `https://corsproxy.io/?${encodeURIComponent(u)}`,
 u => `https://proxy.cors.sh/${u}`
];

let channels = [];
let hls = null;

/* ============================
   M3U PARSE
============================ */
function parseM3U(txt){
 const lines = txt.split("\n");
 const out=[];
 let cur={};

 for(const l of lines){
  const line=l.trim();
  if(line.startsWith("#EXTINF")){
    cur.name=line.split(",")[1]||"Kanal";
  }else if(line && !line.startsWith("#")){
    cur.url=line;
    out.push(cur);
    cur={};
  }
 }
 return out;
}

/* ============================
   LİSTE YÜKLEME
============================ */
async function loadList(){

 // 1) Direkt dene
 try{
  const r=await fetch(M3U_URL,{cache:"no-store"});
  if(r.ok){
    const t=await r.text();
    channels=parseM3U(t);
    if(channels.length) return render();
  }
 }catch(e){}

 // 2) Proxy dene
 for(let p of PROXIES){
  try{
   const r=await fetch(p(M3U_URL));
   if(!r.ok) continue;
   const t=await r.text();
   channels=parseM3U(t);
   if(channels.length) return render();
  }catch(e){}
 }

 document.getElementById("list").innerHTML="❌ Liste yüklenemedi";
}

/* ============================
   LİSTEYİ YAZ
============================ */
function render(){
 const box=document.getElementById("list");
 box.innerHTML="";
 channels.forEach(c=>{
  const d=document.createElement("div");
  d.className="item";
  d.textContent=c.name;
  d.onclick=()=>play(c.url);
  box.appendChild(d);
 });
}

/* ============================
   PLAYER
============================ */
function play(url){
 const v=document.getElementById("video");
 const f=document.getElementById("iframe");

 v.style.display="none";
 f.style.display="none";

 if(hls){hls.destroy();hls=null;}

 if(url.endsWith(".m3u8")){
  v.style.display="block";

  if(Hls.isSupported()){
    hls=new Hls();
    hls.loadSource(url);
    hls.attachMedia(v);
  }else{
    v.src=url;
  }
  v.play();
 }else{
  f.style.display="block";
  f.src=url;
 }
}

function playUrl(){
 const u=document.getElementById("urlInput").value;
 play(u);
}

loadList();
</script>

</body>
</html>
