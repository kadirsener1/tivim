<!DOCTYPE html>
<html lang="tr">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Kadir TV</title>
  <script src="https://cdn.jsdelivr.net/npm/hls.js@latest"></script>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap');

    :root {
      --bg: #0a0a14;
      --card: #12121f;
      --accent: #00e5ff;
      --accent2: #7c4dff;
      --glow: rgba(0,229,255,0.25);
      --text: #eaeaea;
      --dim: #777;
    }

    * { margin:0; padding:0; box-sizing:border-box; }

    html, body { height:100%; overflow:hidden; }

    body {
      font-family:'Inter',sans-serif;
      background: var(--bg);
      color: var(--text);
    }

    /* ─── HEADER ─── */
    header {
      height: 70px;
      background: linear-gradient(90deg, #0d0d1a, #1a0a2e);
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 14px;
      border-bottom: 1px solid rgba(0,229,255,0.15);
      position: relative;
      z-index: 10;
    }
    .logo-icon {
      width: 42px; height: 42px;
      background: linear-gradient(135deg, var(--accent), var(--accent2));
      border-radius: 12px;
      display: flex; align-items: center; justify-content: center;
      font-size: 20px; font-weight: 900; color: #000;
    }
    .logo-text {
      font-size: 1.8rem;
      font-weight: 900;
      background: linear-gradient(90deg, var(--accent), var(--accent2));
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
    }
    .badge {
      background: var(--accent);
      color: #000;
      font-size: 0.65rem;
      font-weight: 700;
      padding: 3px 8px;
      border-radius: 20px;
      margin-left: -4px;
      margin-top: -10px;
    }

    /* ─── LAYOUT ─── */
    .layout {
      display: grid;
      grid-template-columns: 1fr 380px;
      height: calc(100vh - 70px);
    }

    /* ─── PLAYER PANEL ─── */
    .player-panel {
      display: flex;
      flex-direction: column;
      padding: 20px;
      gap: 16px;
    }

    .video-wrap {
      flex: 1;
      background: #000;
      border-radius: 16px;
      overflow: hidden;
      position: relative;
      box-shadow: 0 0 60px rgba(0,229,255,0.15);
      min-height: 0;
    }

    video {
      width: 100%;
      height: 100%;
      display: block;
      object-fit: contain;
      background: #000;
    }

    .now-playing {
      background: var(--card);
      border-radius: 14px;
      padding: 18px 24px;
      display: flex;
      align-items: center;
      gap: 16px;
      border: 1px solid rgba(0,229,255,0.1);
    }
    .now-playing img {
      width: 52px; height: 52px;
      border-radius: 12px;
      border: 2px solid var(--accent);
      object-fit: cover;
      background: #222;
    }
    .now-info h3 {
      font-size: 1.1rem;
      font-weight: 700;
    }
    .now-info p {
      font-size: 0.8rem;
      color: var(--dim);
      margin-top: 2px;
    }
    .live-dot {
      width: 10px; height: 10px;
      background: #ff1744;
      border-radius: 50%;
      animation: pulse 1.2s infinite;
      margin-left: auto;
    }
    @keyframes pulse {
      0%,100% { opacity:1; transform:scale(1); }
      50% { opacity:0.4; transform:scale(1.4); }
    }

    /* ─── SIDEBAR ─── */
    .sidebar {
      background: var(--card);
      border-left: 1px solid rgba(0,229,255,0.1);
      display: flex;
      flex-direction: column;
    }

    .sidebar-header {
      padding: 20px;
      border-bottom: 1px solid rgba(255,255,255,0.06);
    }
    .sidebar-header h2 {
      font-size: 1rem;
      font-weight: 700;
      margin-bottom: 12px;
      color: var(--accent);
    }

    .search-wrap {
      position: relative;
    }
    .search-wrap svg {
      position: absolute;
      left: 14px;
      top: 50%;
      transform: translateY(-50%);
      width: 18px; height: 18px;
      fill: var(--dim);
    }
    .search-wrap input {
      width: 100%;
      padding: 12px 16px 12px 42px;
      border-radius: 12px;
      border: 1px solid rgba(255,255,255,0.08);
      background: rgba(255,255,255,0.04);
      color: #fff;
      font-family: 'Inter';
      font-size: 0.9rem;
      outline: none;
      transition: 0.3s;
    }
    .search-wrap input:focus {
      border-color: var(--accent);
      box-shadow: 0 0 12px var(--glow);
    }

    /* ─── TABS ─── */
    .tabs {
      display: flex;
      gap: 4px;
      padding: 12px 20px;
      overflow-x: auto;
      border-bottom: 1px solid rgba(255,255,255,0.06);
    }
    .tab {
      padding: 8px 16px;
      border-radius: 10px;
      font-size: 0.75rem;
      font-weight: 600;
      cursor: pointer;
      white-space: nowrap;
      background: rgba(255,255,255,0.04);
      color: var(--dim);
      transition: 0.3s;
      border: none;
    }
    .tab:hover { background: rgba(0,229,255,0.1); color: var(--accent); }
    .tab.active {
      background: linear-gradient(135deg, var(--accent), var(--accent2));
      color: #000;
      font-weight: 700;
    }

    /* ─── CHANNEL LIST ─── */
    .ch-list {
      flex: 1;
      overflow-y: auto;
      padding: 8px 0;
    }
    .ch-list::-webkit-scrollbar { width: 6px; }
    .ch-list::-webkit-scrollbar-track { background: transparent; }
    .ch-list::-webkit-scrollbar-thumb { background: var(--accent2); border-radius: 10px; }

    .ch-item {
      display: flex;
      align-items: center;
      gap: 14px;
      padding: 12px 20px;
      cursor: pointer;
      transition: 0.2s;
      border-left: 3px solid transparent;
    }
    .ch-item:hover {
      background: rgba(0,229,255,0.06);
    }
    .ch-item.active {
      background: linear-gradient(90deg, rgba(0,229,255,0.12), transparent);
      border-left: 3px solid var(--accent);
    }
    .ch-item img {
      width: 44px; height: 44px;
      border-radius: 10px;
      object-fit: cover;
      background: #222;
      flex-shrink: 0;
    }
    .ch-meta { flex:1; min-width:0; }
    .ch-meta h4 {
      font-size: 0.88rem;
      font-weight: 600;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }
    .ch-meta span {
      font-size: 0.72rem;
      color: var(--dim);
    }
    .ch-num {
      font-size: 0.7rem;
      color: var(--dim);
      font-weight: 600;
      width: 26px;
      text-align: center;
      flex-shrink: 0;
    }

    /* ─── LOADING ─── */
    .loading-overlay {
      position: fixed;
      inset: 0;
      background: var(--bg);
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      z-index: 9999;
      transition: opacity 0.5s;
    }
    .loading-overlay.hide {
      opacity: 0;
      pointer-events: none;
    }
    .spinner {
      width: 50px; height: 50px;
      border: 4px solid rgba(0,229,255,0.2);
      border-top-color: var(--accent);
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
    }
    @keyframes spin { to { transform: rotate(360deg); } }
    .loading-overlay p {
      margin-top: 16px;
      color: var(--accent);
      font-weight: 600;
    }

    /* ─── ERROR ─── */
    .error-msg {
      position: absolute;
      inset: 0;
      display: none;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      background: rgba(0,0,0,0.85);
      color: #ff5252;
      font-weight: 600;
      gap: 10px;
      z-index: 5;
      border-radius: 16px;
    }
    .error-msg button {
      padding: 10px 24px;
      border: none;
      border-radius: 10px;
      background: var(--accent);
      color: #000;
      font-weight: 700;
      cursor: pointer;
      font-family: 'Inter';
    }

    /* ─── COUNT ─── */
    .ch-count {
      padding: 10px 20px;
      font-size: 0.75rem;
      color: var(--dim);
      border-top: 1px solid rgba(255,255,255,0.06);
      text-align: center;
    }

    /* ─── RESPONSIVE ─── */
    @media (max-width: 900px) {
      .layout {
        grid-template-columns: 1fr;
        grid-template-rows: 45vh 1fr;
      }
      .sidebar { border-left: none; border-top: 1px solid rgba(0,229,255,0.1); }
      .player-panel { padding: 10px; gap: 10px; }
      .now-playing { display: none; }
    }
  </style>
</head>
<body>

  <!-- LOADING -->
  <div class="loading-overlay" id="loading">
    <div class="spinner"></div>
    <p>Kanallar yükleniyor...</p>
  </div>

  <!-- HEADER -->
  <header>
    <div class="logo-icon">K</div>
    <div class="logo-text">KADİR TV</div>
    <span class="badge">CANLI</span>
  </header>

  <!-- MAIN -->
  <div class="layout">

    <!-- LEFT: PLAYER -->
    <div class="player-panel">
      <div class="video-wrap">
        <video id="video" controls autoplay></video>
        <div class="error-msg" id="error">
          <span>⚠️ Kanal açılamadı</span>
          <button onclick="retry()">Tekrar Dene</button>
        </div>
      </div>
      <div class="now-playing" id="nowPlaying">
        <img id="npLogo" src="https://via.placeholder.com/52/222/fff?text=TV" alt="">
        <div class="now-info">
          <h3 id="npName">Kanal Seçin</h3>
          <p id="npGroup">Bir kanala tıklayın</p>
        </div>
        <div class="live-dot"></div>
      </div>
    </div>

    <!-- RIGHT: SIDEBAR -->
    <div class="sidebar">
      <div class="sidebar-header">
        <h2>📺 Kanallar</h2>
        <div class="search-wrap">
          <svg viewBox="0 0 24 24"><path d="M15.5 14h-.79l-.28-.27A6.47 6.47 0 0 0 16 9.5 6.5 6.5 0 1 0 9.5 16c1.61 0 3.09-.59 4.23-1.57l.27.28v.79l5 4.99L20.49 19l-4.99-5zm-6 0C7.01 14 5 11.99 5 9.5S7.01 5 9.5 5 14 7.01 14 9.5 11.99 14 9.5 14z"/></svg>
          <input type="text" id="search" placeholder="Kanal ara..."/>
        </div>
      </div>
      <div class="tabs" id="tabs"></div>
      <div class="ch-list" id="chList"></div>
      <div class="ch-count" id="chCount"></div>
    </div>
  </div>

<script>
const M3U_URL = "https://raw.githubusercontent.com/kadirsener1/tivim/refs/heads/main/1.m3u";

let allChannels = [];
let hls = null;
let currentUrl = "";
let activeGroup = "Tümü";

const videoEl   = document.getElementById('video');
const errorEl   = document.getElementById('error');
const chListEl  = document.getElementById('chList');
const tabsEl    = document.getElementById('tabs');
const searchEl  = document.getElementById('search');
const loadingEl = document.getElementById('loading');
const countEl   = document.getElementById('chCount');

// ─── FETCH & PARSE ───
async function init() {
  try {
    const res  = await fetch(M3U_URL);
    const text = await res.text();
    parseM3U(text);
    buildTabs();
    renderList();

    // İlk kanalı aç
    if (allChannels.length > 0) {
      play(allChannels[0]);
    }

    setTimeout(() => loadingEl.classList.add('hide'), 600);
  } catch(e) {
    loadingEl.innerHTML = `<p style="color:#ff5252">❌ Liste yüklenemedi</p>`;
  }
}

function parseM3U(raw) {
  const lines = raw.split('\n');
  let tmp = {};

  for (let i = 0; i < lines.length; i++) {
    const line = lines[i].trim();

    if (line.startsWith('#EXTINF:')) {
      const name  = line.split(',').pop().trim();
      const logo  = (line.match(/tvg-logo="([^"]*)"/) || [])[1] || "";
      const group = (line.match(/group-title="([^"]*)"/) || [])[1] || "Diğer";
      tmp = { name, logo, group };
    }
    else if (line && !line.startsWith('#') && line.startsWith('http')) {
      tmp.url = line;
      allChannels.push({ ...tmp });
      tmp = {};
    }
  }
}

// ─── TABS ───
function buildTabs() {
  const groups = ["Tümü", ...new Set(allChannels.map(c => c.group))];
  tabsEl.innerHTML = groups.map(g =>
    `<button class="tab ${g === activeGroup ? 'active' : ''}" onclick="selectGroup('${g}')">${g}</button>`
  ).join('');
}

function selectGroup(g) {
  activeGroup = g;
  buildTabs();
  renderList();
}

// ─── RENDER LIST ───
function renderList() {
  const q = searchEl.value.toLowerCase();

  const filtered = allChannels.filter(c => {
    const matchGroup = activeGroup === "Tümü" || c.group === activeGroup;
    const matchSearch = c.name.toLowerCase().includes(q);
    return matchGroup && matchSearch;
  });

  chListEl.innerHTML = filtered.map((c, i) => `
    <div class="ch-item ${c.url === currentUrl ? 'active' : ''}" data-url="${c.url}" onclick='playFromClick(${JSON.stringify(c)})'>
      <span class="ch-num">${i + 1}</span>
      <img src="${c.logo || 'https://via.placeholder.com/44/222/fff?text=TV'}" onerror="this.src='https://via.placeholder.com/44/222/fff?text=TV'" alt="">
      <div class="ch-meta">
        <h4>${c.name}</h4>
        <span>${c.group}</span>
      </div>
    </div>
  `).join('');

  countEl.textContent = `${filtered.length} / ${allChannels.length} kanal`;
}

// ─── PLAY ───
function playFromClick(ch) {
  play(ch);
}

function play(ch) {
  currentUrl = ch.url;
  errorEl.style.display = 'none';

  // Now Playing bar
  document.getElementById('npName').textContent  = ch.name;
  document.getElementById('npGroup').textContent = ch.group;
  document.getElementById('npLogo').src = ch.logo || 'https://via.placeholder.com/52/222/fff?text=TV';
  document.title = ch.name + " • Kadir TV";

  // Aktif işaretle
  renderList();

  // Eski HLS kapat
  if (hls) { hls.destroy(); hls = null; }

  // Yeni HLS başlat
  if (Hls.isSupported()) {
    hls = new Hls({
      maxBufferLength: 30,
      maxMaxBufferLength: 60,
      startLevel: -1
    });
    hls.loadSource(ch.url);
    hls.attachMedia(videoEl);

    hls.on(Hls.Events.MANIFEST_PARSED, () => {
      videoEl.play().catch(() => {});
    });

    hls.on(Hls.Events.ERROR, (e, data) => {
      if (data.fatal) {
        if (data.type === Hls.ErrorTypes.NETWORK_ERROR) {
          hls.startLoad();
        } else if (data.type === Hls.ErrorTypes.MEDIA_ERROR) {
          hls.recoverMediaError();
        } else {
          errorEl.style.display = 'flex';
        }
      }
    });
  }
  else if (videoEl.canPlayType('application/vnd.apple.mpegurl')) {
    // Safari / iOS native HLS
    videoEl.src = ch.url;
    videoEl.addEventListener('loadedmetadata', () => videoEl.play());
  }
  else {
    errorEl.style.display = 'flex';
  }
}

function retry() {
  const ch = allChannels.find(c => c.url === currentUrl);
  if (ch) play(ch);
}

// ─── SEARCH ───
searchEl.addEventListener('input', () => renderList());

// ─── KEYBOARD ───
document.addEventListener('keydown', e => {
  const idx = allChannels.findIndex(c => c.url === currentUrl);
  if (e.key === 'ArrowDown' && idx < allChannels.length - 1) {
    play(allChannels[idx + 1]);
  }
  if (e.key === 'ArrowUp' && idx > 0) {
    play(allChannels[idx - 1]);
  }
});

// ─── START ───
init();
</script>
</body>
</html>
