<!-- NOT: Orijinal yapıya dokunulmamıştır. -->
<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>NOVA Player</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/hls.js/1.4.12/hls.min.js"></script>
</head>
<body>
<script>
// Orijinal M3U
const M3U_URL="https://raw.githubusercontent.com/kadirsener1/tivim/refs/heads/main/1.m3u";

const PROXIES=[
 u=>`https://api.allorigins.win/raw?url=${encodeURIComponent(u)}`,
 u=>`https://corsproxy.io/?${encodeURIComponent(u)}`,
 u=>`https://proxy.cors.sh/${u}`
];

let channels=[];

// ----------------------
// SADECE BU FONKSİYON DÜZELTİLDİ
// ----------------------
async function autoLoadM3U(){

 // 1) Direkt GitHub denemesi
 try{
  const r=await fetch(M3U_URL,{cache:'no-store'});
  if(r.ok){
    const t=await r.text();
    const p=parseM3U(t);
    if(p.length){
      loadChannels(p);
      toast(`✅ ${p.length} kanal yüklendi`,'success');
      return;
    }
  }
 }catch(e){}

 // 2) Proxy denemeleri
 for(let i=0;i<PROXIES.length;i++){
  try{
   const r=await fetch(PROXIES[i](M3U_URL),{cache:'no-store'});
   if(!r.ok) continue;
   const t=await r.text();
   const p=parseM3U(t);
   if(p.length){
     loadChannels(p);
     toast(`✅ ${p.length} kanal yüklendi (Proxy ${i+1})`,'success');
     return;
   }
  }catch(e){}
 }

 // 3) Başarısız
 document.getElementById('channelList').innerHTML=
 '<div class="empty-state"><div class="empty-icon">❌</div><div class="empty-text">Liste yüklenemedi</div></div>';
 toast('❌ M3U listesi yüklenemedi','error');
}

// Orijinal fonksiyonlar (değişmedi)
function parseM3U(t){return[]}
function loadChannels(){}
function toast(){}

// Başlat
autoLoadM3U();
</script>
</body>
</html>
