<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>CANLI TV</title>
<script src="https://cdn.jsdelivr.net/npm/hls.js@latest"></script>

<style>
body{margin:0;background:#000;color:#fff;font-family:Arial}
header{padding:10px;background:#111}
.app{display:grid;grid-template-columns:280px 1fr;height:calc(100vh - 50px)}
.sidebar{background:#111;overflow:auto}
.main{display:flex;flex-direction:column;background:#000}
.channel{padding:8px;border-bottom:1px solid #222;cursor:pointer}
.channel.active{background:#333}
#video{width:100%;background:#000;display:none}
.player{background:#000}
.ctrl{padding:8px;background:#111}
</style>
</head>

<body>

<header>CANLI TV</header>

<div class="app">

<!-- SIDEBAR -->
<aside class="sidebar" id="channelList">Yükleniyor...</aside>

<!-- MAIN -->
<main class="main">

<div class="player">
<video id="video" controls playsinline></video>
</div>

<div class="ctrl">
<button onclick="prevCh()">◀</button>
<button onclick="nextCh()">▶</button>
<button onclick="stopPlayer()">■</button>
</div>

</main>
</div>

<script>
const M3U_URL="https://raw.githubusercontent.com/kadirsener1/tivim/refs/heads/main/1.m3u";

let allChannels=[],currentCh=null,hls;

/* LOAD */
fetch(M3U_URL).then(r=>r.text()).then(t=>{
 const lines=t.split("\n");
 for(let i=0;i<lines.length;i++){
  if(lines[i].startsWith("#EXTINF")){
   const name=lines[i].split(",")[1]||"Kanal";
   const url=lines[i+1]?.trim();
   if(url?.startsWith("http")){
     allChannels.push({name,url});
   }
  }
 }
 render();
});

function render(){
 const el=document.getElementById("channelList");
 el.innerHTML=allChannels.map((c,i)=>
  `<div class="channel" onclick="play(${i})">${c.name}</div>`
 ).join("");
}

const video=document.getElementById("video");

function play(i){
 currentCh=i;
 const ch=allChannels[i];
 if(hls)hls.destroy();
 video.style.display="block";
 if(Hls.isSupported()){
   hls=new Hls();
   hls.loadSource(ch.url);
   hls.attachMedia(video);
   hls.on(Hls.Events.MANIFEST_PARSED,()=>video.play());
 }else{
   video.src=ch.url;
   video.play();
 }
}

function stopPlayer(){
 if(hls)hls.destroy();
 video.pause();
 video.style.display="none";
}

function nextCh(){
 if(currentCh==null)return;
 play((currentCh+1)%allChannels.length);
}

function prevCh(){
 if(currentCh==null)return;
 play((currentCh-1+allChannels.length)%allChannels.length);
}
</script>

</body>
</html>
